<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Go PayTV Status</title>

<style>
html, body {
    margin: 0;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 12px;
}

/* ✅ GLOBAL FIX */
* {
    box-sizing: border-box;
}

.container {
    width: 95%;
    max-width: 1400px;
    margin: 10px auto;
}

.row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.section {
    background: #1e293b;
    padding: 10px;
    border-radius: 8px;
    min-width: 0;
}

.bug-raised {
    flex: 1;
    overflow: visible;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 10px;
}

.header h1 {
    margin: 0;
    font-size: 22px;
}

/* ✅ HEADER LAYOUT FIX */
.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}

/* ✅ WRAPPER PREVENTS FLEX SHRINK */
.dropdown-wrap {
    flex: none; /* ✅ critical fix */
    width: 160px;
}

/* ✅ DROPDOWN FIX */
.dropdown {
    width: 100%;
    display: block;

    background: #0f172a;
    color: #e2e8f0;

    border: 1px solid #334155;
    border-radius: 6px;

    padding: 6px 8px;
    font-size: 12px;
}

/* TABLE */
.table-wrapper {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 400px;
}

th, td {
    padding: 6px;
    text-align: left;
}

td { border-top: 1px solid #334155; }

.warn { color: #facc15; }
.good { color: #22c55e; }

/* ✅ MOBILE FIX */
@media (max-width: 768px) {

    .row {
        flex-direction: column;
    }

    .section-header {
        flex-direction: column;
        align-items: stretch;
    }

    /* ✅ FULL WIDTH DROPDOWN WRAP */
    .dropdown-wrap {
        width: 100%;
    }

    /* ✅ FULL WIDTH DROPDOWN */
    .dropdown {
        width: 100%;
        font-size: 14px;
        padding: 8px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>Astro Go PayTV Big Screen Status</h1>
</div>

<div class="row">

<div class="section bug-raised">

<div class="section-header">
    <h3>New Bugs Raised</h3>

    <!-- ✅ WRAPPED DROPDOWN -->
    <div class="dropdown-wrap">
        <select class="dropdown" onchange="handleMenu(this)">
            <option value="">JIRA</option>
            <option value="jira">Total M8 JIRA Raised Dashboard</option>
        </select>
    </div>

</div>

<div class="table-wrapper">
<table>
<tr><th>Platform</th><th>L1</th></tr>
<tbody id="bugRaisedTable"></tbody>
</table>
</div>

</div>

</div>

</div>

<script>
const br=[55,54,53,55];
const names=["AndroidTV","WebOS","Tizen","Vidaa"];
let total=0, html="";

for(let i=0;i<br.length;i++){
 total+=br[i];
 html+=`<tr><td>${names[i]}</td><td class="warn">${br[i]}</td></tr>`;
}
html+=`<tr><td><b>Total</b></td><td class="good"><b>${total}</b></td></tr>`;
document.getElementById("bugRaisedTable").innerHTML=html;

function handleMenu(select){
 if(select.value==="jira"){
  window.open("https://astrogo.atlassian.net/issues/?jql=filter+%3D+%22ALTV+M8+BUG%22","_blank");
 }
 select.value="";
}
</script>

</body>
</html>
